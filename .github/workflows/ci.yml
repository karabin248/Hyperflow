name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  baseline-qualification:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package with extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[api,test]"

      - name: Run test suite
        run: make test

      - name: Run baseline qualification gate
        run: make baseline-qualify

      - name: Run packaging smoke test
        run: make packaging-smoke

  release-verify:
    runs-on: ubuntu-latest
    needs: baseline-qualification
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package with extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[api,test]"

      - name: Release verify
        run: make release-verify
